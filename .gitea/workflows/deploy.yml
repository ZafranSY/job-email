name: Deploy Job Email Suite

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        env:
          GIT_SSL_NO_VERIFY: "true" 
      - name: Distribute Artifacts and Orchestrate Stack
        run: |
          # 1. Enforce target deployment tracking layouts
          mkdir -p /opt/homelab/compose/job-email
          mkdir -p /opt/homelab/data/job-email
          
          # 2. Flush and sync fresh workspace assets across layers
          rm -rf /opt/homelab/compose/job-email/*
          cp -R . /opt/homelab/compose/job-email/
          
          # 3. Hand over execution mechanics to the Docker Engine daemon
          cd /opt/homelab/compose/job-email
          docker compose down || true
          docker compose up --build -d
